<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ethnmz's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Space+Mono&display=swap"
        rel="stylesheet">

    <style>
        /* =========================================
           1. GLOBAL VARIABLES & RESET 
           ========================================= */
        :root {
            --dark-bg: #11151c;
            --forest-green: #3a4f3d;
            --stone-grey: #6a6e6d;
            --cloud-grey: #b0b7b8;
            --globe-blue: #54a5e3;

            --text-main: #e8ecee;
            --text-muted: #8ea4b5;

            --glass-bg: rgba(30, 35, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background-color: var(--dark-bg);
        }

        /* =========================================
           2. SYSTEM BOOT LOADING SCREEN
           ========================================= */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            z-index: 99998;
            /* Just below the custom cursor */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease, backdrop-filter 0.4s ease;
            /* Keeps the watercolor background visible but heavily darkened and blurred */
            background: rgba(17, 21, 28, 0.85);
            backdrop-filter: blur(20px);
        }

        .loader-glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .loader-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .loader-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: var(--cloud-grey);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loader-percentage {
            font-family: 'Space Mono', monospace;
            color: var(--globe-blue);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 15px rgba(84, 165, 227, 0.4);
        }

        .loader-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .loader-bar-fill {
            height: 100%;
            width: 0%;
            /* Animates via JS */
            background: var(--globe-blue);
            box-shadow: 0 0 10px var(--globe-blue);
            transition: width 0.15s ease-out;
            /* Slight ease to make it look chunky/mechanical */
        }

        .loader-log {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            height: 15px;
            /* Fixed height to prevent jumping */
        }

        /* =========================================
           3. BACKGROUND & AESTHETIC LAYERS
           ========================================= */
        .watercolor-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 15% 50%, rgba(58, 79, 61, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(106, 110, 109, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(84, 165, 227, 0.15) 0%, transparent 60%);
            filter: blur(40px);
            z-index: 0;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 24px 24px;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
            z-index: 1;
        }

        .sweeps-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .sweep {
            position: absolute;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(-35deg);
            box-shadow: 0 0 30px rgba(176, 183, 184, 0.1);
        }

        .sweep-1 {
            top: -10%;
            left: -20%;
            width: 150%;
            height: 120px;
            opacity: 0.8;
        }

        .sweep-2 {
            top: 40%;
            left: -10%;
            width: 120%;
            height: 40px;
            opacity: 0.5;
        }

        .sweep-3 {
            top: 80%;
            left: 10%;
            width: 100%;
            height: 200px;
            opacity: 0.3;
            filter: blur(5px);
        }

        .micro-text {
            position: absolute;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            z-index: 10;
        }

        .micro-right {
            right: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: right center;
        }

        .micro-left {
            left: 20px;
            bottom: 80px;
        }

        /* =========================================
           4. UI COMPONENTS (SMOKED GLASS)
           ========================================= */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(180deg, rgba(17, 21, 28, 0.6) 0%, rgba(17, 21, 28, 0) 100%);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--cloud-grey);
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--globe-blue);
            text-shadow: 0 0 10px rgba(84, 165, 227, 0.5);
        }

        main {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 140px);
            padding: 0 50px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 16px 40px 0 rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--cloud-grey);
            margin-bottom: 30px;
        }

        .terminal {
            background: #0a0d12;
            border-radius: 8px;
            padding: 15px 20px;
            border: 1px solid #2a313b;
            font-family: 'Space Mono', monospace;
            color: var(--globe-blue);
            font-size: 0.9rem;
            margin-bottom: 30px;
            min-height: 50px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .glass-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 22px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--cloud-grey);
            font-family: 'Space Mono', monospace;
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-decoration: none;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
            transition: all 0.25s ease;
        }

        .glass-btn:hover {
            color: var(--globe-blue);
            border-color: rgba(84, 165, 227, 0.4);
            background: rgba(84, 165, 227, 0.08);
            box-shadow: 0 0 12px rgba(84, 165, 227, 0.15);
        }

        .marquee-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            z-index: 10;
            display: flex;
            background: rgba(17, 21, 28, 0.5);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .marquee-content {
            display: flex;
            gap: 50px;
            animation: scroll 20s linear infinite;
            white-space: nowrap;
            padding-left: 50px;
        }

        .marquee-item {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--cloud-grey);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .glass-cube {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* =========================================
           5. CUSTOM GLOWING CURSOR
           ========================================= */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 99999;
            background-color: var(--globe-blue);
            box-shadow: 0 0 10px var(--globe-blue);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s, box-shadow 0.2s, border 0.2s;
        }

        .custom-cursor.hovering {
            width: 35px;
            height: 35px;
            background-color: rgba(84, 165, 227, 0.1);
            border: 1px solid var(--globe-blue);
            box-shadow: 0 0 15px rgba(84, 165, 227, 0.4);
        }
    </style>
</head>

<body>

    <!-- BOOT UP LOADING SCREEN -->
    <div id="loader-wrapper">
        <div class="loader-glass">
            <div class="loader-header">
                <span class="loader-title">SYS_INIT // BOOT</span>
                <span class="loader-percentage" id="loader-percent">000%</span>
            </div>
            <div class="loader-bar-container">
                <div class="loader-bar-fill" id="loader-fill"></div>
            </div>
            <div class="loader-log">
                <span id="loader-text">> establishing connection...</span><span class="cursor-blink">_</span>
            </div>
        </div>
    </div>

    <!-- Background Art Direction -->
    <div class="watercolor-bg"></div>
    <div class="grid-overlay"></div>

    <!-- Parallax Vector Sweeps -->
    <div class="sweeps-container" id="sweeps">
        <div class="sweep sweep-1"></div>
        <div class="sweep sweep-2"></div>
        <div class="sweep sweep-3"></div>
    </div>

    <!-- Micro Tech Text -->
    <div class="micro-text micro-left">LAT: 34.0522 // LNG: -118.2437<br>UPLINK ESTABLISHED</div>
    <div class="micro-text micro-right">SYS_VER: 2.0.26 // CS_PORTFOLIO.INIT</div>

    <!-- Navigation -->
    <nav>
        <div class="nav-links">
            <a href="#" class="hover-target"></a>
            <a href="#" class="hover-target"></a>
            <a href="#" class="hover-target"></a>
            <a href="#" class="hover-target"></a>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="glass-panel">
            <h1>ethnmz</h1>
            <h2> Ethan Meza's Portfolio </h2>

            <div class="terminal">
                <span id="typewriter"></span><span class="cursor-blink">_</span>
            </div>

            <div class="button-row">
                <a href="projects.html" class="glass-btn hover-target">PROJECTS</a>
                <a href="socials.html" class="glass-btn hover-target">SOCIALS</a>
            </div>
        </div>
    </main>

    <!-- Tech Stack Marquee -->
    <div class="marquee-container">
        <div class="marquee-content hover-target">
            <div class="marquee-item">
                <div class="glass-cube"></div> C++
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Python
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> React.js
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Java
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Node.js
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> SQL
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> C++
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Python
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> React.js
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Java
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> Node.js
            </div>
            <div class="marquee-item">
                <div class="glass-cube"></div> SQL
            </div>
        </div>
    </div>

    <!-- Custom High-Tech Cursor -->
    <div class="custom-cursor" id="cursor"></div>

    <script>
        // --- 1. SYSTEM BOOT LOADER LOGIC ---
        const loaderWrapper = document.getElementById('loader-wrapper');
        const loaderFill = document.getElementById('loader-fill');
        const loaderPercentText = document.getElementById('loader-percent');
        const loaderText = document.getElementById('loader-text');

        // --- 4. Terminal Typing Effect (Hero Section) ---
        const typeTarget = document.getElementById('typewriter');
        const textToType = '> compiling portfolio... \n> loading assets... \n> build successful. status: ONLINE.';
        let i = 0;
        function startTypeWriter() {
            if (i < textToType.length) {
                if (textToType.charAt(i) === '\n') {
                    typeTarget.innerHTML += '<br>';
                } else {
                    typeTarget.innerHTML += textToType.charAt(i);
                }
                i++;
                setTimeout(startTypeWriter, Math.random() * 50 + 30);
            }
        }

        function skipLoader() {
            loaderWrapper.style.opacity = '0';
            loaderWrapper.style.visibility = 'hidden';
            startTypeWriter();
        }

        // Only show the loader the first time in this session
        if (sessionStorage.getItem('visited')) {
            skipLoader();
        } else {
            sessionStorage.setItem('visited', '1');

            const bootLogs = [
                'establishing connection...',
                'compiling portfolio...',
                'loading assets...',
                'build successful. status: ONLINE.'
            ];

            let progress = 0;
            let logIndex = 0;

            const loadingInterval = setInterval(() => {
                progress += Math.floor(Math.random() * 12) + 3;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        loaderWrapper.style.opacity = '0';
                        loaderWrapper.style.visibility = 'hidden';
                        setTimeout(startTypeWriter, 300);
                    }, 250);
                }
                loaderFill.style.width = progress + '%';
                loaderPercentText.innerText = progress.toString().padStart(3, '0') + '%';
                const expectedLogIndex = Math.floor((progress / 100) * bootLogs.length);
                if (expectedLogIndex > logIndex && logIndex < bootLogs.length - 1) {
                    logIndex = expectedLogIndex;
                    loaderText.innerText = '> ' + bootLogs[logIndex];
                }
            }, 90);
        }


        // --- 2. Custom Cursor Logic ---
        const cursor = document.getElementById('cursor');
        const hoverTargets = document.querySelectorAll('.hover-target, .glass-btn');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            target.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });
        // --- 3. 3D Sweep Parallax Effect ---
        const sweepsContainer = document.getElementById('sweeps');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            sweepsContainer.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        });
        // Note: startTypeWriter() is triggered by the Loader finishing (or skipLoader on return visits).
    </script>
</body>

</html>
